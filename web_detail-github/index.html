<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LINSY 林氏 - 商城WEB端交易链路 Demo</title>
  <link rel="stylesheet" href="./mall-trade-demo.css" />
</head>
<body>
  <div id="app">
    <p style="padding:24px;font-family:sans-serif;color:#78848d">Loading demo...</p>
  </div>
  <script>
    window.__demoLoadError = function (name) {
      var app = document.getElementById('app');
      if (!app) return;
      app.innerHTML = '<div style="padding:24px;font-family:sans-serif;max-width:560px">'
        + '<h2 style="color:#e53935;margin-bottom:12px">Demo 加载失败</h2>'
        + '<p>无法加载 <code>' + name + '</code>。请确认：</p>'
        + '<ol style="line-height:1.8;color:#56646d">'
        + '<li>已<strong>解压 zip</strong>后再打开（不要从 zip 内直接双击）</li>'
        + '<li><code>mall-trade-demo.js</code> 与 <code>index.html</code> 在同一文件夹</li>'
        + '<li>或直接打开同目录下的 <strong>standalone.html</strong>（单文件，无需依赖）</li>'
        + '</ol></div>';
    };
    window.addEventListener('error', function (e) {
      var app = document.getElementById('app');
      if (app && !app.querySelector('.topbar')) {
        app.innerHTML = '<pre style="padding:24px;color:#e53935;white-space:pre-wrap">'
          + 'JS Error: ' + e.message + '\n' + (e.filename || '') + ':' + (e.lineno || '') + '</pre>';
      }
    });
  </script>
  <script src="./mall-i18n.js" onerror="__demoLoadError('mall-i18n.js')"></script>
  <script src="./mall-trade-demo.js" onerror="__demoLoadError('mall-trade-demo.js')"></script>
</body>
</html>
