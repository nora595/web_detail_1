<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LINSY 林氏 - 商城WEB端交易链路 Demo</title>
  <style>
:root {
  --primary: #4ed9cc;
  --primary-dark: #3bc4b8;
  --primary-soft: rgba(78, 217, 204, 0.12);
  --text: #2b3136;
  --muted: #8a959c;
  --line: #e8edef;
  --bg: #f5f7f8;
  --card: #fff;
  --tag-bg: #fff0de;
  --tag-text: #d7892c;
  --danger: #e05c6a;
  --footer-bg: #2d3439;
  --footer-text: #b8c0c5;
  --shadow: 0 8px 24px rgba(20, 45, 58, 0.08);
  --container: 1280px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  min-height: 100%;
  background: var(--bg);
  color: var(--text);
  font: 14px/1.5 "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
  -webkit-font-smoothing: antialiased;
}

button, input, select { font: inherit; }
a { color: inherit; text-decoration: none; }
img { display: block; max-width: 100%; }

.container {
  max-width: var(--container);
  margin: 0 auto;
  padding: 0 24px;
}

/* Top bar */
.topbar {
  background: var(--primary);
  color: #fff;
  font-size: 12px;
}

.topbar-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  min-height: 36px;
  gap: 16px;
}

.topbar-left { flex-shrink: 0; }

.topbar-right-group {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 14px;
  margin-left: auto;
  flex-wrap: wrap;
}

.service-info {
  opacity: 0.95;
  white-space: nowrap;
}

.topbar-tools {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}

.user-greet { font-weight: 500; }
.icon-exit { opacity: 0.85; margin-left: 4px; cursor: pointer; }

.switch-wrap { position: relative; }
.switch-btn {
  border: none;
  background: transparent;
  color: #fff;
  cursor: pointer;
  padding: 4px 6px;
  font-size: 12px;
}
.switch-menu {
  display: none;
  position: absolute;
  right: 0;
  top: 100%;
  background: #fff;
  color: var(--text);
  border-radius: 8px;
  box-shadow: var(--shadow);
  min-width: 100px;
  z-index: 100;
  overflow: hidden;
}
.switch-menu.open { display: block; }
.switch-option {
  display: block;
  width: 100%;
  border: none;
  background: transparent;
  padding: 10px 14px;
  text-align: left;
  cursor: pointer;
}
.switch-option:hover, .switch-option.active { background: var(--primary-soft); }
.sep { opacity: 0.6; }
.guide { cursor: pointer; }

/* Header */
.header {
  background: #fff;
  border-bottom: 1px solid var(--line);
  position: sticky;
  top: 0;
  z-index: 50;
}

.header-inner {
  display: flex;
  align-items: center;
  gap: 12px;
  min-height: 64px;
}

.brand {
  display: flex;
  align-items: center;
  gap: 6px;
  cursor: pointer;
  flex-shrink: 0;
}

.brand-logo {
  padding: 4px 10px 4px 0;
  margin-right: 4px;
}

.brand-en {
  font-size: 28px;
  font-weight: 800;
  color: #3bc4b8;
  letter-spacing: 0.04em;
  line-height: 1;
}

.brand-cn {
  font-size: 18px;
  color: #2b3136;
  font-weight: 700;
  line-height: 1;
  letter-spacing: 0.08em;
}

.main-nav {
  display: flex;
  align-items: center;
  gap: 22px;
  flex: 0 1 auto;
  justify-content: flex-start;
  margin-left: 0;
}

.search-box {
  display: flex;
  align-items: center;
  border: 1px solid var(--line);
  border-radius: 999px;
  overflow: hidden;
  width: 220px;
  flex-shrink: 0;
  margin-left: auto;
}

.nav-link {
  position: relative;
  padding: 8px 0;
  color: #4a5560;
  font-size: 15px;
  transition: color 0.15s;
}

.nav-link:hover { color: var(--primary-dark); }
.nav-link.active {
  color: var(--text);
  font-weight: 600;
}

.nav-link.active::after {
  content: "";
  position: absolute;
  left: 0;
  right: 0;
  bottom: -20px;
  height: 3px;
  background: var(--primary);
  border-radius: 2px;
}

.nav-link .arrow { font-size: 10px; margin-left: 2px; }
.nav-link .badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 18px;
  height: 18px;
  padding: 0 5px;
  margin-left: 4px;
  border-radius: 999px;
  background: var(--danger);
  color: #fff;
  font-size: 11px;
  font-weight: 600;
}

.search-box input {
  flex: 1;
  border: none;
  padding: 8px 14px;
  outline: none;
  min-width: 0;
}

.search-btn {
  border: none;
  background: transparent;
  padding: 8px 12px;
  cursor: pointer;
  color: var(--muted);
}

.search-box.small { width: 180px; }

.main { min-height: calc(100vh - 200px); padding-bottom: 48px; }

/* Buttons */
.btn-primary {
  border: none;
  background: var(--primary);
  color: #fff;
  font-weight: 600;
  padding: 12px 24px;
  border-radius: 6px;
  cursor: pointer;
  transition: background 0.15s, transform 0.1s;
}

.btn-primary:hover { background: var(--primary-dark); }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-primary.full { width: 100%; }
.btn-primary.small { padding: 8px 16px; font-size: 13px; }

.btn-ghost {
  border: 1px solid var(--line);
  background: #fff;
  color: var(--text);
  padding: 10px 18px;
  border-radius: 6px;
  cursor: pointer;
}

.btn-ghost:hover { border-color: var(--primary); color: var(--primary-dark); }
.btn-ghost.small { padding: 8px 14px; font-size: 13px; }

.btn-icon {
  width: 48px;
  height: 48px;
  border: 1px solid var(--line);
  background: #fff;
  border-radius: 6px;
  font-size: 22px;
  cursor: pointer;
  flex-shrink: 0;
}

.btn-icon:hover { border-color: var(--primary); color: var(--primary-dark); }

.link-btn {
  border: none;
  background: transparent;
  color: var(--primary-dark);
  cursor: pointer;
  padding: 4px 8px;
  font-size: 13px;
}

.link-btn:hover { text-decoration: underline; }
.link-btn.danger { color: var(--danger); }

/* Hero */
.hero-carousel {
  position: relative;
  overflow: hidden;
  background: #eef1f3;
  max-height: 480px;
}

.hero-track {
  display: flex;
  transition: transform 0.45s ease;
}

.hero-slide {
  flex: 0 0 100%;
  position: relative;
  min-height: 420px;
}

.hero-img {
  width: 100%;
  height: 420px;
  object-fit: cover;
}

.hero-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, rgba(0,0,0,0.45) 0%, transparent 60%);
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 0 8%;
  color: #fff;
}

.hero-overlay h2 { font-size: 36px; margin-bottom: 10px; }
.hero-overlay p { font-size: 16px; opacity: 0.9; margin-bottom: 20px; max-width: 480px; }

.hero-arrow {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 44px;
  height: 44px;
  border: none;
  border-radius: 50%;
  background: rgba(255,255,255,0.85);
  font-size: 24px;
  cursor: pointer;
  z-index: 2;
  box-shadow: var(--shadow);
}

.hero-arrow.prev { left: 20px; }
.hero-arrow.next { right: 20px; }

.hero-dots {
  position: absolute;
  bottom: 16px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 8px;
}

.hero-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  border: none;
  background: rgba(255,255,255,0.5);
  cursor: pointer;
}

.hero-dot.on { background: var(--primary); width: 24px; border-radius: 4px; }

/* Home sections */
.home-section { padding: 40px 0 20px; }
.section-title { font-size: 22px; font-weight: 700; margin-bottom: 20px; }
.section-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }

.home-cats {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 16px;
}

.home-cat-card {
  background: #fff;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: var(--shadow);
  transition: transform 0.15s;
  cursor: pointer;
}

.home-cat-card:hover { transform: translateY(-3px); }
.home-cat-img { width: 100%; aspect-ratio: 1; object-fit: cover; }
.home-cat-card span {
  display: block;
  padding: 10px;
  text-align: center;
  font-size: 13px;
  font-weight: 500;
}

.home-promo {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
  padding: 24px 0 48px;
}

.promo-card {
  display: flex;
  gap: 20px;
  background: #fff;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: var(--shadow);
  padding: 16px;
  align-items: center;
}

.promo-img { width: 200px; height: 140px; object-fit: cover; border-radius: 8px; flex-shrink: 0; }
.promo-card h3 { font-size: 18px; margin-bottom: 8px; }
.promo-card p { color: var(--muted); margin-bottom: 12px; font-size: 13px; }

/* Category bar */
.category-bar {
  background: #fff;
  border-bottom: 1px solid var(--line);
  padding: 12px 0;
}

.category-scroll {
  display: flex;
  align-items: center;
  gap: 12px;
  overflow-x: auto;
  scrollbar-width: none;
}

.category-scroll::-webkit-scrollbar { display: none; }

.cat-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  border: none;
  background: transparent;
  cursor: pointer;
  padding: 8px 12px;
  border-radius: 8px;
  min-width: 90px;
  flex-shrink: 0;
  font-size: 12px;
  color: var(--muted);
}

.cat-item.active { color: var(--primary-dark); background: var(--primary-soft); }
.cat-img { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; }
.cat-arrow { border: none; background: transparent; font-size: 20px; cursor: pointer; color: var(--muted); padding: 8px; }

/* Products page */
.page-products {
  display: grid;
  grid-template-columns: 1fr;
  gap: 24px;
  padding: 24px 0 48px;
}

.page-products.with-filter { grid-template-columns: 240px 1fr; }

.filter-panel {
  background: #fff;
  border-radius: 12px;
  padding: 16px;
  box-shadow: var(--shadow);
  height: fit-content;
  position: sticky;
  top: 88px;
}

.filter-head {
  display: flex;
  justify-content: space-between;
  font-weight: 600;
  margin-bottom: 16px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--line);
}

.filter-block { margin-bottom: 18px; }
.filter-block h4 { font-size: 13px; margin-bottom: 10px; color: var(--muted); }

.chip-group { display: flex; flex-wrap: wrap; gap: 6px; }
.chip {
  border: 1px solid var(--line);
  background: #fff;
  padding: 5px 10px;
  border-radius: 999px;
  font-size: 12px;
  cursor: pointer;
}

.chip.active { border-color: var(--primary); background: var(--primary-soft); color: var(--primary-dark); }
.range-bar { height: 4px; background: var(--line); border-radius: 2px; margin-bottom: 10px; position: relative; }
.range-fill { height: 100%; width: 60%; background: var(--primary); border-radius: 2px; }
.check { display: block; font-size: 13px; margin-bottom: 6px; cursor: pointer; }

.sort-bar {
  display: flex;
  align-items: center;
  gap: 20px;
  margin-bottom: 20px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--line);
}

.sort-item {
  border: none;
  background: transparent;
  cursor: pointer;
  color: var(--muted);
  font-size: 13px;
}

.sort-item.active { color: var(--text); font-weight: 600; }

.product-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 20px;
}

.home-grid { grid-template-columns: repeat(5, 1fr); }

.product-card {
  background: #fff;
  border-radius: 10px;
  overflow: hidden;
  box-shadow: var(--shadow);
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
}

.product-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 12px 32px rgba(20, 45, 58, 0.12);
}

.card-img { position: relative; aspect-ratio: 1; background: #eef1f3; }
.product-img { width: 100%; height: 100%; object-fit: cover; }

.thumb-dots {
  position: absolute;
  bottom: 8px;
  left: 8px;
  display: flex;
  gap: 4px;
  align-items: center;
}

.dot-img { width: 28px; height: 28px; border-radius: 4px; object-fit: cover; border: 1px solid #fff; }
.more { font-size: 11px; background: rgba(0,0,0,0.5); color: #fff; padding: 2px 6px; border-radius: 4px; }

.card-body { padding: 12px; }
.card-title-row { display: flex; justify-content: space-between; gap: 8px; margin-bottom: 6px; }
.card-title { font-size: 13px; font-weight: 500; line-height: 1.35; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; flex: 1; }
.fav-btn { border: none; background: transparent; font-size: 18px; cursor: pointer; color: var(--muted); flex-shrink: 0; }
.fav-btn.on { color: var(--danger); }
.card-price { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
.card-meta { font-size: 11px; color: var(--muted); display: flex; flex-direction: column; gap: 2px; }

.pagination {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  margin-top: 32px;
}

.pagination.right { justify-content: flex-end; }

.page-btn {
  min-width: 36px;
  height: 36px;
  border: 1px solid var(--line);
  background: #fff;
  border-radius: 6px;
  cursor: pointer;
}

.page-btn.active { background: var(--primary); border-color: var(--primary); color: #fff; }
.page-ellipsis { padding: 0 8px; color: var(--muted); }

/* Product detail - ref layout image 1/2 */
.page-detail {
  padding: 24px 0 56px;
  background: var(--bg);
}

.detail-hero {
  margin-bottom: 20px;
}

.detail-panel-card {
  background: #fff;
  border-radius: 8px;
  box-shadow: 0 1px 4px rgba(20, 45, 58, 0.06);
  margin-bottom: 20px;
  overflow: hidden;
}

.detail-tabs-ref {
  display: flex;
  gap: 0;
  border-bottom: 1px solid #eef1f3;
  margin-bottom: 0;
  background: #fff;
  border-radius: 0;
  padding: 0 20px;
}

.detail-tabs-ref .tab {
  border: none;
  background: transparent;
  padding: 14px 18px;
  font-size: 14px;
  color: #78848d;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  white-space: nowrap;
}

.detail-tabs-ref .tab.active {
  color: #2b3136;
  font-weight: 600;
  border-bottom-color: var(--primary);
}

.detail-content-ref {
  background: #fff;
  border-radius: 0;
  padding: 24px 28px 0;
  box-shadow: none;
  margin-bottom: 0;
}

.detail-desc-unified {
  background: #fff;
}

.detail-desc-unified .detail-block-title {
  font-size: 15px;
  font-weight: 700;
  margin: 14px 0 8px;
  color: #2b3136;
}

.detail-desc-unified .detail-block-title:first-child {
  margin-top: 0;
}

.detail-desc-unified .detail-overview {
  color: #56646d;
  line-height: 1.75;
  margin: 0 0 0;
}

.detail-desc-unified .selling-points-list {
  margin: 0;
  padding-left: 18px;
  color: #56646d;
  line-height: 1.75;
}

.detail-desc-unified .selling-points-list li {
  margin-bottom: 6px;
}

.detail-desc-unified .selling-points-list li:last-child {
  margin-bottom: 0;
}

.detail-content-ref .detail-block-title {
  font-size: 15px;
  font-weight: 700;
  margin: 20px 0 10px;
  color: #2b3136;
}

.detail-content-ref:not(:has(.detail-desc-unified)) {
  padding-bottom: 24px;
}
  border: 1px solid #dfe6ea;
  margin: 8px 0 0;
}

.spec-attr-table-inline {
  border: 1px solid #dfe6ea;
  margin: 0;
}

.spec-attr-cell-inline {
  padding: 11px 14px;
  border: 1px solid #dfe6ea;
  font-size: 13px;
  background: #fff;
  min-height: 42px;
}

.spec-attr-cell-inline .spec-attr-label {
  color: #78848d;
  font-weight: 400;
}

.spec-attr-cell-inline .spec-attr-val {
  color: #2b3136;
  font-weight: 500;
}

/* Lifestyle carousel - flush with attributes */
.carousel-block-ref {
  margin: 0;
  background: #fff;
  box-shadow: none;
  padding: 0;
}

.detail-recommend-block {
  background: #fff;
  padding: 0 28px 28px;
}

.detail-panel-card .recommend-section-ref,
.detail-panel-card .recommend-section {
  margin-bottom: 24px;
  background: #fff;
}

.detail-panel-card .recommend-section-ref:last-child,
.detail-panel-card .recommend-section:last-child {
  margin-bottom: 0;
}

.detail-panel-card .recommend-section-head h3 {
  margin-bottom: 12px;
}

.carousel-block-ref .carousel-img {
  position: relative;
  border-radius: 0;
  aspect-ratio: 16 / 5.5;
  overflow: hidden;
  background: #eef1f3;
}

.carousel-block-ref .carousel-arrow {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.92);
  border: none;
  font-size: 26px;
  color: #666;
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
}

.carousel-dots-overlay {
  position: absolute;
  left: 0;
  right: 0;
  bottom: 14px;
  display: flex;
  justify-content: center;
  gap: 8px;
  margin-top: 0;
  z-index: 3;
}

.carousel-dots-overlay .carousel-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  border: none;
  background: rgba(255, 255, 255, 0.55);
  cursor: pointer;
  padding: 0;
}

.carousel-dots-overlay .carousel-dot.on {
  background: var(--primary);
  width: 22px;
  border-radius: 4px;
}

/* Recommend cards - ref image 3 */
.recommend-card-ref {
  border: none;
  border-radius: 0;
  background: transparent;
  box-shadow: none;
}

.recommend-card-ref .card-img {
  border-radius: 4px;
  overflow: hidden;
  margin-bottom: 8px;
}

.recommend-card-ref .card-body {
  padding: 0 2px 8px;
}

.rec-title-row {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 8px;
  margin-bottom: 4px;
}

.rec-title-row .card-title-single {
  flex: 1;
  font-size: 13px;
  font-weight: 500;
  line-height: 1.35;
  margin: 0;
  -webkit-line-clamp: 2;
  display: -webkit-box;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.rec-fav-btn {
  flex-shrink: 0;
  width: 32px;
  height: 32px;
  border: 1px solid #dfe6ea;
  border-radius: 4px;
  background: #fff;
  color: #78848d;
  font-size: 16px;
  line-height: 1;
  cursor: pointer;
  padding: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

.rec-fav-btn.on {
  color: var(--danger);
  border-color: #f0c4c4;
}

.card-price-split {
  display: flex;
  align-items: baseline;
  gap: 1px;
  margin-bottom: 4px;
  line-height: 1.1;
}

.card-price-split .price-sym {
  font-size: 13px;
  font-weight: 600;
  color: #2b3136;
  margin-right: 2px;
}

.card-price-split .price-int {
  font-size: 22px;
  font-weight: 700;
  color: #2b3136;
}

.card-price-split .price-dec {
  font-size: 16px;
  font-weight: 700;
  color: #2b3136;
}

.card-price-split .price-ccy {
  font-size: 12px;
  font-weight: 400;
  color: #9aa5ad;
  margin-left: 4px;
}

.card-meta-row {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  font-size: 12px;
  color: #3bc4b8;
  font-weight: 500;
  margin-bottom: 2px;
}

.card-item-row {
  font-size: 11px;
  color: #9aa5ad;
  line-height: 1.4;
}

.recommend-section-ref,
.recommend-section {
  margin-bottom: 32px;
  background: #fff;
}

.recommend-section-head h3 {
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 14px;
  color: #2b3136;
}

.recommend-carousel {
  position: relative;
  display: flex;
  align-items: stretch;
  gap: 10px;
}

.rec-arrow {
  flex: 0 0 28px;
  align-self: center;
  width: 28px;
  height: 28px;
  border: 1px solid #dfe6ea;
  border-radius: 50%;
  background: #fff;
  font-size: 18px;
  cursor: pointer;
  color: #888;
  line-height: 1;
}

.recommend-grid-5 {
  flex: 1;
  display: grid;

  font-size: 12px;

/* Toast */
.toast {
  position: fixed;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: rgba(43, 49, 54, 0.92);
  color: #fff;
  padding: 12px 24px;
  border-radius: 8px;
  font-size: 14px;
  z-index: 300;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s, transform 0.25s;
}

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

  .attr-table { grid-template-columns: repeat(2, 1fr); }

  .home-promo { grid-template-columns: 1fr; }
}

  function startHomeAutoplay() {
    clearInterval(state.homeTimer);
    if (state.route === 'index') {
      state.homeTimer = setInterval(() => {
        state.homeSlide = (state.homeSlide + 1) % HOME_BANNERS.length;
        const track = $('.hero-track');
        const dots = $$('.hero-dot');
        if (track) track.style.transform = `translateX(-${state.homeSlide * 100}%)`;
        dots.forEach((d, i) => d.classList.toggle('on', i === state.homeSlide));
      }, 5000);
    }
  }

  function render() {
    parseRoute();
    clearInterval(state.homeTimer);
    let html;
    switch (state.route) {
      case 'index': html = renderHomePage(); break;
      case 'detail': html = renderDetailPageV2(); break;
      case 'wishlist': html = renderWishlistPage(); break;
      case 'account': html = renderAccountPage(); break;
      case 'products':
      default: html = renderProductsPage(); break;
    }
    $('#app').innerHTML = html;
    bindEvents();
    startHomeAutoplay();
  }

  function bindEvents() {
    $$('[data-toggle-dropdown]').forEach((el) => el.addEventListener('click', (e) => {
      e.stopPropagation();
      const key = el.dataset.toggleDropdown;
      state.openDropdown = state.openDropdown === key ? null : key;
      render();
    }));
    $$('[data-set-locale]').forEach((el) => el.addEventListener('click', (e) => {
      e.stopPropagation();
      state.locale = el.dataset.setLocale;
      state.openDropdown = null;
      savePrefs(state);
      render();
    }));
    $$('[data-set-currency]').forEach((el) => el.addEventListener('click', (e) => {
      e.stopPropagation();
      state.currency = el.dataset.setCurrency;
      state.openDropdown = null;
      savePrefs(state);
      render();
    }));
    if (state.openDropdown) {
      setTimeout(() => {
        const onDocClick = () => {
          state.openDropdown = null;
          document.removeEventListener('click', onDocClick);
          render();
        };
        document.addEventListener('click', onDocClick);
      }, 0);
    }

    $$('[data-nav]').forEach((el) => el.addEventListener('click', () => navigate(el.dataset.nav)));
    $$('[data-cat]').forEach((el) => el.addEventListener('click', () => { state.category = el.dataset.cat; navigate('products'); }));
    $$('[data-cat-jump]').forEach((el) => el.addEventListener('click', (e) => {
      e.preventDefault();
      state.category = el.dataset.catJump;
      navigate('products');
    }));
    $$('[data-hero-link]').forEach((el) => el.addEventListener('click', () => navigate(el.dataset.heroLink)));
    $$('[data-hero-slide]').forEach((el) => el.addEventListener('click', () => {
      const dir = el.dataset.heroSlide;
      state.homeSlide = dir === 'next'
        ? (state.homeSlide + 1) % HOME_BANNERS.length
        : (state.homeSlide - 1 + HOME_BANNERS.length) % HOME_BANNERS.length;
      render();
    }));
    $$('[data-hero-dot]').forEach((el) => el.addEventListener('click', () => { state.homeSlide = Number(el.dataset.heroDot); render(); }));
    $$('[data-detail]').forEach((el) => el.addEventListener('click', (e) => {
      if (e.target.closest('[data-fav]')) return;
      navigate('detail', el.dataset.detail);
    }));
    $$('[data-fav]').forEach((el) => el.addEventListener('click', (e) => {
      e.stopPropagation();
      const id = el.dataset.fav;
      if (state.favorites.has(id)) state.favorites.delete(id); else state.favorites.add(id);
      showToast(state.favorites.has(id) ? tx('toastFavOn') : tx('toastFavOff'));
      render();
    }));
    $$('[data-sort]').forEach((el) => el.addEventListener('click', () => { state.sort = el.dataset.sort; render(); }));
    $$('[data-page]').forEach((el) => {
      el.addEventListener('click', () => {
        const p = el.dataset.page;
        if (p === 'prev') state.page = Math.max(1, state.page - 1);
        else if (p === 'next') state.page = Math.min(17, state.page + 1);
        else state.page = Number(p);
        render();
      });
    });
    const toggleFilter = $('[data-action="toggle-filter"]');
    if (toggleFilter) toggleFilter.addEventListener('click', () => { state.showFilter = !state.showFilter; render(); });
    $$('[data-detail-tab]').forEach((el) => el.addEventListener('click', () => {
      state.detailTab = el.dataset.detailTab;
      render();
    }));
    $$('[data-detail-thumb]').forEach((el) => el.addEventListener('click', () => { state.detailThumb = Number(el.dataset.detailThumb); render(); }));
    $$('[data-detail-slide]').forEach((el) => el.addEventListener('click', () => {
      const len = (state.detailProduct.gallery || []).length || 1;
      state.detailThumb = el.dataset.detailSlide === 'next'
        ? (state.detailThumb + 1) % len
        : (state.detailThumb - 1 + len) % len;
      render();
    }));
    $$('[data-lifestyle-slide]').forEach((el) => el.addEventListener('click', () => {
      const p = state.detailProduct;
      const len = (p.lifestyleGallery || p.gallery).length;
      state.lifestyleSlide = el.dataset.lifestyleSlide === 'next'
        ? (state.lifestyleSlide + 1) % len
        : (state.lifestyleSlide - 1 + len) % len;
      render();
    }));
    $$('[data-lifestyle-dot]').forEach((el) => el.addEventListener('click', () => { state.lifestyleSlide = Number(el.dataset.lifestyleDot); render(); }));
    $$('[data-rec-slide]').forEach((el) => el.addEventListener('click', () => {
      const key = el.dataset.recSlide;
      const dir = el.dataset.dir;
      const pool = key === 'recSeriesSlide'
        ? getDetailRecommendations(state.detailProduct, 'series')
        : getDetailRecommendations(state.detailProduct, 'category');
      const maxStart = Math.max(0, pool.length - 5);
      state[key] = dir === 'next'
        ? Math.min(maxStart, (state[key] || 0) + 1)
        : Math.max(0, (state[key] || 0) - 1);
      render();
    }));
    const othSelect = $('#othAttrSelect');
    if (othSelect) othSelect.addEventListener('change', () => { state.otherAttrIdx = Number(othSelect.value); });
    $$('[data-sale]').forEach((el) => el.addEventListener('click', () => {
      state.saleType = el.dataset.sale;
      const p = state.detailProduct;
      state.selectedColor = 0;
      state.selectedSize = 0;
      state.selectedMaterial = 0;
      state.detailQty = state.saleType === 'custom' ? (p.customMoq || p.moq) : p.moq;
      render();
    }));
    $$('[data-mode]').forEach((el) => el.addEventListener('click', () => {
      if (el.dataset.mode === 'list') {
        state.detailMode = 'list';
        state.listModeOpen = true;
      } else {
        state.detailMode = 'variations';
        state.listModeOpen = false;
      }
      render();
    }));
    $$('[data-color]').forEach((el) => el.addEventListener('click', () => { state.selectedColor = Number(el.dataset.color); render(); }));
    $$('[data-size]').forEach((el) => el.addEventListener('click', () => { state.selectedSize = Number(el.dataset.size); render(); }));
    $$('[data-material]').forEach((el) => el.addEventListener('click', () => { state.selectedMaterial = Number(el.dataset.material); render(); }));
    $$('[data-qty]').forEach((el) => el.addEventListener('click', () => {
      const p = state.detailProduct;
      const minQty = state.saleType === 'custom' ? (p.customMoq || p.moq) : 0;
      state.detailQty = Math.max(minQty, Math.min(p.stock, state.detailQty + Number(el.dataset.qty)));
      render();
    }));
    const qtyInput = $('#detailQtyInput');
    if (qtyInput) qtyInput.addEventListener('change', () => {
      const p = state.detailProduct;
      const minQty = state.saleType === 'custom' ? (p.customMoq || p.moq) : 0;
      state.detailQty = Math.max(minQty, Math.min(p.stock, parseInt(qtyInput.value, 10) || minQty));
      render();
    });
    const addWish = $('[data-action="add-wishlist"]');
    if (addWish) addWish.addEventListener('click', () => showToast(tx('toastWishlist')));
    const toggleFavDetail = $('[data-action="toggle-fav-detail"]');
    if (toggleFavDetail) toggleFavDetail.addEventListener('click', () => {
      const id = state.detailProduct.id;
      if (state.favorites.has(id)) state.favorites.delete(id);
      else state.favorites.add(id);
      showToast(state.favorites.has(id) ? tx('toastFavOn') : tx('toastFavOff'));
      render();
    });
    $$('[data-action="close-list-mode"]').forEach((el) => el.addEventListener('click', () => {
      state.listModeOpen = false;
      state.detailMode = 'variations';
      render();
    }));
    $$('[data-drawer-sale]').forEach((el) => el.addEventListener('click', () => {
      state.listDrawerSaleType = el.dataset.drawerSale;
      render();
    }));
    $$('[data-row-check]').forEach((el) => el.addEventListener('change', () => {
      const row = state.listModeRows.find((r) => r.id === el.dataset.rowCheck);
      if (row) row.checked = el.checked;
      render();
    }));
    $$('[data-row-qty]').forEach((el) => el.addEventListener('click', () => {
      const row = state.listModeRows.find((r) => r.id === el.dataset.rowQty);
      if (row) { row.qty = Math.max(0, row.qty + Number(el.dataset.delta)); if (row.qty > 0) row.checked = true; render(); }
    }));
    const batchAdd = $('[data-action="batch-add-wishlist"]');
    if (batchAdd) batchAdd.addEventListener('click', () => {
      state.listModeOpen = false;
      state.detailMode = 'variations';
      showToast(tx('toastBatchWishlist'));
      render();
    });
    $$('[data-wl-check]').forEach((el) => el.addEventListener('change', () => {
      const item = state.wishlist.find((w) => w.id === el.dataset.wlCheck);
      if (item) item.selected = el.checked;
      render();
    }));
    $$('[data-wl-qty]').forEach((el) => el.addEventListener('click', () => {
      const item = state.wishlist.find((w) => w.id === el.dataset.wlQty);
      if (item) { item.qty = Math.max(item.moq, item.qty + Number(el.dataset.delta)); render(); }
    }));
    $$('[data-wl-del]').forEach((el) => el.addEventListener('click', () => {
      state.wishlist = state.wishlist.filter((w) => w.id !== el.dataset.wlDel);
      showToast(tx('toastDeleted'));
      render();
    }));
    const clearInvalid = $('[data-wl="clear-invalid"]');
    if (clearInvalid) clearInvalid.addEventListener('click', () => {
      state.wishlist = state.wishlist.filter((w) => w.status === 'Current');
      showToast(tx('toastClearInvalid'));
      render();
    });
    const buyNow = $('[data-action="buy-now"]');
    if (buyNow) buyNow.addEventListener('click', () => {
      const hasException = state.wishlist.some((w) => w.selected && w.status !== 'Current');
      if (hasException || state.wishlist.some((w) => w.status === 'Pending Disco')) {
        state.modal = 'exception';
        render();
      } else {
        showToast(tx('toastOrderCreated'));
        navigate('account', 'po');
      }
    });
    $$('[data-action="close-modal"]').forEach((el) => el.addEventListener('click', () => { state.modal = null; state.paymentDetail = null; render(); }));
    const confirmOrder = $('[data-action="confirm-order"]');
    if (confirmOrder) confirmOrder.addEventListener('click', () => {
      state.modal = null;
      showToast(tx('toastOrderCreated'));
      navigate('account', 'po');
    });
    const collectPay = $('[data-action="collect-pay"]');
    if (collectPay) collectPay.addEventListener('click', () => showToast(tx('toastCollectPay')));
    $$('[data-po-tab]').forEach((el) => el.addEventListener('click', () => { state.poTab = el.dataset.poTab; render(); }));
    $$('[data-dispatch-tab]').forEach((el) => el.addEventListener('click', () => { state.dispatchTab = el.dataset.dispatchTab; render(); }));
    $$('[data-payment-tab]').forEach((el) => el.addEventListener('click', () => { state.paymentTab = el.dataset.paymentTab; render(); }));
    $$('[data-po-detail]').forEach((el) => el.addEventListener('click', () => { state.modal = 'po-detail'; render(); }));
    $$('[data-dispatch-detail]').forEach((el) => el.addEventListener('click', () => { state.modal = 'dispatch-detail'; render(); }));
    $$('[data-payment-detail]').forEach((el) => el.addEventListener('click', () => {
      const pay = PAYMENT_LIST.find((p) => p.payNo === el.dataset.paymentDetail);
      state.paymentDetail = pay || PAYMENT_LIST[0];
      state.modal = 'payment-detail';
      render();
    }));
    const paymentJump = $('[data-payment-jump]');
    if (paymentJump) paymentJump.addEventListener('click', () => {
      const pay = PAYMENT_LIST.find((p) => p.payNo === paymentJump.dataset.paymentJump) || PAYMENT_LIST[0];
      state.paymentDetail = pay;
      state.modal = 'payment-detail';
      navigate('account', 'payment');
    });
  }

  function boot() {
    try {
      window.addEventListener('hashchange', render);
      if (!location.hash) location.hash = '#/detail/p1';
      render();
    } catch (err) {
      const app = document.getElementById('app');
      if (app) {
        app.innerHTML = `<pre style="padding:24px;color:#e53935;white-space:pre-wrap;font-family:sans-serif">Demo Error: ${err.message}\n\n${err.stack || ''}</pre>`;
      }
      console.error(err);
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', boot);
  } else {
    boot();
  }
})();



  </script>
</body>
</html>
